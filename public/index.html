<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>칼럼 팟캐스트 리더</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 로딩 상태 -->
        <div id="loadingState" class="loading-overlay" style="display: none;">
            <div class="spinner"></div>
            <p>칼럼을 불러오는 중...</p>
        </div>

        <!-- 에러 상태 -->
        <div id="errorState" class="error-overlay" style="display: none;">
            <p class="error-message"></p>
            <button id="retryBtn" class="btn-retry">다시 시도</button>
        </div>

        <!-- 홈 화면 (인기글 목록) -->
        <div id="homeView" class="view-container">
            <!-- 헤더 -->
            <div class="main-header">
                <h1>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
                        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
                    </svg>
                    칼럼 팟캐스트
                </h1>
                <div class="header-actions">
                    <button id="themeToggleHome" class="btn-icon" title="테마 전환">
                        <svg class="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- URL 추가 섹션 -->
            <div class="url-add-section">
                <p class="section-label">링크로 추가하기</p>
                <div class="url-input-group">
                    <input
                        type="url"
                        id="urlInputHome"
                        placeholder="칼럼 URL을 입력하세요"
                        aria-label="칼럼 URL"
                    >
                    <button id="addUrlBtn" class="btn-add">추가</button>
                </div>
            </div>

            <!-- 인기글 목록 -->
            <div class="popular-section">
                <div class="section-header">
                    <h2 class="section-title">인기 칼럼</h2>
                    <button id="playAllBtn" class="btn-play-all">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                        전체 재생
                    </button>
                </div>
                <div id="popularContent" class="popular-content">
                    <!-- 인기글 카드가 동적으로 추가됨 -->
                </div>
            </div>
        </div>

        <!-- 재생목록 화면 -->
        <div id="playlistView" class="view-container" style="display: none;">
            <!-- 헤더 -->
            <div class="main-header">
                <h1>재생목록</h1>
                <div class="header-actions">
                    <button id="editPlaylistBtn" class="btn-icon" title="편집">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                    </button>
                    <button id="addBtnPlaylist" class="btn-icon" title="칼럼 추가">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                    <button id="themeToggle" class="btn-icon" title="테마 전환">
                        <svg class="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 칼럼 목록 -->
            <div class="playlist-container">
                <div id="playlistContent" class="playlist-content">
                    <!-- 칼럼 카드가 동적으로 추가됨 -->
                </div>
            </div>

            <!-- 플레이어 (전체 화면) -->
            <div id="playerScreen" class="player-screen">
                <!-- 헤더 -->
                <div class="player-header">
                    <button id="closePlayer" class="btn-icon" title="닫기">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"></path>
                        </svg>
                    </button>
                </div>

                <!-- 플레이어 컨텐츠 -->
                <div class="player-content">
                    <!-- 제목 -->
                    <div class="player-info-section">
                        <h2 id="playerTitle" class="player-title">칼럼 제목</h2>
                        <div class="player-meta">
                            <span id="playerAuthor"></span>
                            <span id="playerDuration"></span>
                        </div>
                    </div>

                    <!-- 전체 문장 리스트 -->
                    <div class="sentences-list-section">
                        <div id="sentencesList" class="sentences-list"></div>
                    </div>

                    <!-- 진행 바 -->
                    <div class="progress-section">
                        <div class="progress-bar" id="progressBar">
                            <div id="progressFill" class="progress-fill"></div>
                        </div>
                        <div class="time-display">
                            <span id="currentTime">0:00</span>
                            <span id="totalTime">0:00</span>
                        </div>
                    </div>

                    <!-- 재생 컨트롤 -->
                    <div class="playback-controls">
                        <!-- 속도 버튼 -->
                        <div class="dropdown-control">
                            <button id="speedBtn" class="btn-text-control">1.0x</button>
                            <div id="speedDropdown" class="dropdown-menu" style="display: none;">
                                <button class="dropdown-item" data-speed="0.5">0.5x</button>
                                <button class="dropdown-item" data-speed="0.75">0.75x</button>
                                <button class="dropdown-item" data-speed="1">1.0x</button>
                                <button class="dropdown-item" data-speed="1.25">1.25x</button>
                                <button class="dropdown-item" data-speed="1.5">1.5x</button>
                                <button class="dropdown-item" data-speed="1.75">1.75x</button>
                                <button class="dropdown-item" data-speed="2">2.0x</button>
                            </div>
                        </div>

                        <button id="backwardBtn" class="btn-control">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M11 12L18 5v14L11 12z"></path>
                                <path d="M4 12L11 5v14L4 12z"></path>
                            </svg>
                            <span class="control-label">10초</span>
                        </button>

                        <button id="playBtn" class="btn-play-large">
                            <svg class="play-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                                <polygon points="5 3 19 12 5 21 5 3"></polygon>
                            </svg>
                        </button>

                        <button id="forwardBtn" class="btn-control">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M13 12L6 5v14L13 12z"></path>
                                <path d="M20 12L13 5v14L20 12z"></path>
                            </svg>
                            <span class="control-label">10초</span>
                        </button>

                        <!-- 목소리 버튼 -->
                        <div class="dropdown-control">
                            <button id="voiceBtn" class="btn-text-control">여성 A</button>
                            <div id="voiceDropdown" class="dropdown-menu" style="display: none;">
                                <div class="dropdown-group">
                                    <div class="dropdown-group-label">Neural2</div>
                                    <button class="dropdown-item" data-voice="ko-KR-Neural2-A" data-label="여성 A">여성 A</button>
                                    <button class="dropdown-item" data-voice="ko-KR-Neural2-B" data-label="여성 B">여성 B</button>
                                    <button class="dropdown-item" data-voice="ko-KR-Neural2-C" data-label="남성 C">남성 C</button>
                                </div>
                                <div class="dropdown-group">
                                    <div class="dropdown-group-label">WaveNet</div>
                                    <button class="dropdown-item" data-voice="ko-KR-Wavenet-A" data-label="여성 A">여성 A</button>
                                    <button class="dropdown-item" data-voice="ko-KR-Wavenet-B" data-label="여성 B">여성 B</button>
                                    <button class="dropdown-item" data-voice="ko-KR-Wavenet-C" data-label="남성 C">남성 C</button>
                                    <button class="dropdown-item" data-voice="ko-KR-Wavenet-D" data-label="남성 D">남성 D</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 미니 플레이어 바 -->
        <div id="bottomSheet" class="bottom-sheet" style="display: none;">
            <div class="mini-player" id="miniPlayer">
                <img id="miniThumbnail" class="mini-thumbnail" src="" alt="">
                <div class="mini-info" id="miniInfo">
                    <div id="miniTitle" class="mini-title">칼럼 제목</div>
                    <div id="miniAuthor" class="mini-author">작성자</div>
                </div>
                <div class="mini-controls">
                    <button id="miniPlayBtn" class="mini-play-btn">
                        <svg class="mini-play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                    </button>
                    <button id="miniPlaylistBtn" class="mini-playlist-btn" title="재생목록">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="8" y1="6" x2="21" y2="6"></line>
                            <line x1="8" y1="12" x2="21" y2="12"></line>
                            <line x1="8" y1="18" x2="21" y2="18"></line>
                            <line x1="3" y1="6" x2="3.01" y2="6"></line>
                            <line x1="3" y1="12" x2="3.01" y2="12"></line>
                            <line x1="3" y1="18" x2="3.01" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>
            <!-- 진행 바 -->
            <div class="mini-progress">
                <div id="miniProgressFill" class="mini-progress-fill"></div>
            </div>
        </div>

        <!-- 하단 네비게이션 -->
        <nav id="bottomNav" class="bottom-nav">
            <button id="navHome" class="nav-item active">
                <svg class="nav-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span class="nav-label">홈</span>
            </button>
            <button id="navPlaylist" class="nav-item">
                <svg class="nav-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="8" y1="6" x2="21" y2="6"></line>
                    <line x1="8" y1="12" x2="21" y2="12"></line>
                    <line x1="8" y1="18" x2="21" y2="18"></line>
                    <line x1="3" y1="6" x2="3.01" y2="6"></line>
                    <line x1="3" y1="12" x2="3.01" y2="12"></line>
                    <line x1="3" y1="18" x2="3.01" y2="18"></line>
                </svg>
                <span class="nav-label">재생목록</span>
            </button>
        </nav>

        <!-- URL 추가 모달 -->
        <div id="urlModal" class="modal" style="display: none;">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>칼럼 추가</h2>
                    <button id="closeModal" class="btn-close">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <input
                        type="url"
                        id="urlInputModal"
                        placeholder="칼럼 URL을 입력하세요"
                        aria-label="칼럼 URL"
                    >
                </div>
                <div class="modal-footer">
                    <button id="cancelModal" class="btn-secondary">취소</button>
                    <button id="submitModal" class="btn-primary">추가</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
